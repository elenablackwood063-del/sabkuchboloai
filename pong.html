<!DOCTYPE html>
<html>
<head>
    <title>Pong Game</title>
    <style>
        canvas {
            background: #000;
            display: block;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <canvas id="pong" width="800" height="400"></canvas>
    <script>
        const canvas = document.getElementById('pong');
        const context = canvas.getContext('2d');
        
        // create the pong paddle
        const paddleWidth = 10, paddleHeight = 100;
        const player = { x: 0, y: canvas.height / 2 - paddleHeight / 2, width: paddleWidth, height: paddleHeight, score: 0 };
        const ai = { x: canvas.width - paddleWidth, y: canvas.height / 2 - paddleHeight / 2, width: paddleWidth, height: paddleHeight, score: 0 };
        
        // create the pong ball
        const ball = { x: canvas.width / 2, y: canvas.height / 2, radius: 10, speed: 4, velocityX: 4, velocityY: 4 };
        
        // draw everything
        function draw() {
            // clear the canvas
            context.clearRect(0, 0, canvas.width, canvas.height);
            
            // draw paddles
            context.fillStyle = '#fff';
            context.fillRect(player.x, player.y, player.width, player.height);
            context.fillRect(ai.x, ai.y, ai.width, ai.height);
            
            // draw ball
            context.beginPath();
            context.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2, false);
            context.fill();
            context.closePath();
            
            // draw score
            context.font = "20px Arial";
            context.fillText(player.score, canvas.width / 4, canvas.height / 5);
            context.fillText(ai.score, 3 * canvas.width / 4, canvas.height / 5);
        }
        
        // control paddles
        canvas.addEventListener('mousemove', (event) => {
            let rect = canvas.getBoundingClientRect();
            player.y = event.clientY - rect.top - player.height / 2;
        });
        
        document.addEventListener('keydown', (event) => {
            if (event.key === 'ArrowUp' && player.y > 0) {
                player.y -= 20;
            }
            if (event.key === 'ArrowDown' && player.y < canvas.height - player.height) {
                player.y += 20;
            }
        });
        
        // move the ball
        function update() {
            ball.x += ball.velocityX;
            ball.y += ball.velocityY;
            
            // collision detection
            if (ball.y + ball.radius > canvas.height || ball.y - ball.radius < 0) {
                ball.velocityY = -ball.velocityY;
            }
            if (ball.x + ball.radius > canvas.width) {
                player.score++; 
                resetBall();
            }
            if (ball.x - ball.radius < 0) {
                ai.score++; 
                resetBall();
            }
            if (ball.x - ball.radius < player.x + player.width && ball.y > player.y && ball.y < player.y + player.height) {
                ball.velocityX = -ball.velocityX;
            }
            if (ball.x + ball.radius > ai.x && ball.y > ai.y && ball.y < ai.y + ai.height) {
                ball.velocityX = -ball.velocityX;
            }
            
            // AI control
            ai.y += (ball.y - (ai.y + ai.height / 2)) * 0.1;
        }
        
        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.velocityX = -ball.velocityX;
        }
        
        // game loop
        function game() {
            draw();
            update();
            requestAnimationFrame(game);
        }
        
        game();
    </script>
</body>
</html>
